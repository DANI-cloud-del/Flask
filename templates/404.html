{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="text-center px-4">
        <div class="text-9xl font-bold mb-4 bg-gradient-to-r from-blue-600 to-purple-600 text-transparent bg-clip-text">
            404
        </div>
        <h1 class="text-4xl font-bold mb-4 text-gray-800">Page Not Found</h1>
        <p class="text-xl text-gray-600 mb-8">
            Oops! The page you're looking for doesn't exist.
        </p>
        <div class="flex justify-center space-x-4">
            <a href="{{ url_for('index') }}" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold px-8 py-3 rounded-lg shadow-md hover:shadow-lg transition duration-300">
                Go Home
            </a>
            <a href="javascript:history.back()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-8 py-3 rounded-lg transition duration-300">
                Go Back
            </a>
        </div>
        <div class="mt-12">
            <img src="https://images.unsplash.com/photo-1584824486509-112e4181ff6b?w=400" alt="404" class="mx-auto rounded-xl shadow-lg">
        </div>
    </div>
</div>
{% endblock %}
