{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="text-center px-4">
        <div class="text-9xl font-bold mb-4 bg-gradient-to-r from-red-600 to-orange-600 text-transparent bg-clip-text">
            500
        </div>
        <h1 class="text-4xl font-bold mb-4 text-gray-800">Internal Server Error</h1>
        <p class="text-xl text-gray-600 mb-8">
            Something went wrong on our end. We're working to fix it!
        </p>
        <div class="flex justify-center space-x-4">
            <a href="{{ url_for('index') }}" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold px-8 py-3 rounded-lg shadow-md hover:shadow-lg transition duration-300">
                Go Home
            </a>
            <button onclick="window.location.reload()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-8 py-3 rounded-lg transition duration-300">
                Try Again
            </button>
        </div>
        <div class="mt-8 bg-red-50 border border-red-200 rounded-lg p-6 max-w-md mx-auto">
            <p class="text-sm text-gray-700">
                <strong>Technical details:</strong> If you're a developer, check your server logs for more information.
            </p>
        </div>
    </div>
</div>
{% endblock %}
